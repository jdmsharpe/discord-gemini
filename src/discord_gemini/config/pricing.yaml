# Google Gemini API pricing catalog.
#
# Canonical source: https://ai.google.dev/pricing
# Cross-referenced against: https://github.com/pydantic/genai-prices/blob/main/prices/providers/google.yml
# Last-verified: 2026-04-17
#
# Chat-model prices are USD per million tokens. Thinking tokens are billed at
# the output-token rate. Video and image generation use per-unit (second or
# image) pricing with resolution/size tiers.
#
# Override this file at runtime by setting GEMINI_PRICING_PATH to an alternate
# YAML path — useful for pushing new pricing without a code release.
#
# NOTE: Some chat models (gemini-2.5-pro, gemini-3.1-pro-preview) have tiered
# pricing for prompts > 200K tokens. The rates below are the lower tier; very
# long conversations may cost more in practice.

models:
  gemini-3.1-pro-preview:        { input_per_million: 2.0,   output_per_million: 12.0 }
  gemini-3.1-flash-lite-preview: { input_per_million: 0.25,  output_per_million: 1.50 }
  gemini-3-flash-preview:        { input_per_million: 0.50,  output_per_million: 3.0 }
  gemini-2.5-pro:                { input_per_million: 1.25,  output_per_million: 10.0 }
  gemini-2.5-flash:              { input_per_million: 0.30,  output_per_million: 2.50 }
  gemini-2.5-flash-lite:         { input_per_million: 0.10,  output_per_million: 0.40 }
  gemini-2.0-flash:              { input_per_million: 0.10,  output_per_million: 0.40 }
  gemini-2.0-flash-lite:         { input_per_million: 0.075, output_per_million: 0.30 }

# Image generation pricing. For Gemini image models, input is token-based and
# output is per-image with resolution tiers ("1k", "2k"). For Imagen models,
# input cost is 0 and per-image is flat (only "default" key is set).
image_generation:
  gemini-3.1-flash-image-preview:
    input_per_million: 0.50
    per_image_by_size:
      default: 0.067
      1k: 0.067
      2k: 0.101
  gemini-3-pro-image-preview:
    input_per_million: 2.00
    per_image_by_size:
      default: 0.134
      1k: 0.134
      2k: 0.134
  gemini-2.5-flash-image:
    input_per_million: 0.30
    per_image_by_size:
      default: 0.039
      1k: 0.039
      2k: 0.039
  imagen-4.0-generate-001:
    input_per_million: 0.0
    per_image_by_size: { default: 0.04 }
  imagen-4.0-ultra-generate-001:
    input_per_million: 0.0
    per_image_by_size: { default: 0.06 }
  imagen-4.0-fast-generate-001:
    input_per_million: 0.0
    per_image_by_size: { default: 0.02 }

# Video generation pricing (per second, keyed by resolution).
video_generation:
  veo-3.1-lite-generate-preview:
    per_second_by_resolution: { default: 0.05, 720p: 0.05, 1080p: 0.08 }
  veo-3.1-generate-preview:
    per_second_by_resolution: { default: 0.40, 720p: 0.40, 1080p: 0.40, 4k: 0.60 }
  veo-3.1-fast-generate-preview:
    per_second_by_resolution: { default: 0.10, 720p: 0.10, 1080p: 0.12, 4k: 0.30 }
  veo-3.0-generate-001:
    per_second_by_resolution: { default: 0.40, 720p: 0.40, 1080p: 0.40, 4k: 0.40 }
  veo-3.0-fast-generate-001:
    per_second_by_resolution: { default: 0.10, 720p: 0.10, 1080p: 0.12, 4k: 0.30 }
  veo-2.0-generate-001:
    per_second_by_resolution: { default: 0.35 }

# TTS models — tokenized input/output like chat models.
text_to_speech:
  gemini-2.5-flash-preview-tts: { input_per_million: 0.50, output_per_million: 10.00 }
  gemini-2.5-pro-preview-tts:   { input_per_million: 1.00, output_per_million: 20.00 }

tools:
  google_maps_grounding:
    per_request: 0.025  # $25 / 1K grounded prompts

fallbacks:
  unknown_chat_model:  { input_per_million: 2.0,  output_per_million: 12.0 }
  unknown_image_model:
    input_per_million: 0.50
    per_image: 0.067
  unknown_video_model: { per_second: 0.35 }
  unknown_tts_model:   { input_per_million: 0.50, output_per_million: 10.00 }
